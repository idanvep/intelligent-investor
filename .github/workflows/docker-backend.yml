name: Build, Test and Push Backend

on:
  push:
    branches:
      - main
      - dev
      - stage
      - "feature/**"
  workflow_dispatch:

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install backend dependencies
        run: cd backend && npm ci
      
      - name: Install E2E dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run unit tests
        run: cd backend && npm run test:unit

      - name: Run integration tests
        run: cd backend && npm run test:integration

      - name: Start application with Docker Compose
        run: docker compose up -d --build

      - name: Wait for application health
        run: |
          echo "Waiting for backend and database..."

          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3001/health; then
              echo "Backend health check passed"
              break
            fi

            echo "Attempt $i failed - retrying..."
            sleep 2
          done

          curl -fsS http://localhost:3001/health
          curl -fsS http://localhost:8080

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Stop Docker Compose services
        if: always()
        run: docker compose down -v

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ii-backend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ii-backend:${{ github.sha }} \
            ./backend

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ii-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ii-backend:${{ github.sha }}