name: Build, Test and Push Backend

on:
  push:
    branches:
      - main
      - dev
      - stage
      - "feature/**"
      - "fix/**"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js 18
        uses: actions/setup-node@v6
        with:
          node-version: "18"

      # -------------------------
      # Backend tests
      # -------------------------

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run unit tests
        run: cd backend && npm run test:unit

      - name: Run integration tests
        run: cd backend && npm run test:integration

      # -------------------------
      # Playwright E2E setup
      # -------------------------

      - name: Install E2E dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # -------------------------
      # Start and test full system
      # -------------------------

      - name: Start application with Docker Compose
        run: docker compose up -d --build

      - name: Wait for application health
        run: |
          echo "Waiting for backend, database and frontend..."

          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3001/health > /dev/null &&
               curl -fsS http://localhost:8080 > /dev/null; then
              echo "Application is healthy"
              exit 0
            fi

            echo "Attempt $i failed - retrying in 2 seconds..."
            sleep 2
          done

          echo "Application did not become healthy"
          docker compose ps
          docker compose logs backend
          docker compose logs db
          docker compose logs frontend
          exit 1

      - name: Run Playwright E2E tests
        run: npm run test:e2e

      - name: Stop Docker Compose services
        if: always()
        run: docker compose down -v

      # -------------------------
      # Docker Hub delivery
      # -------------------------

      - name: Verify Docker Hub secrets exist
        shell: bash
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "DOCKERHUB_USERNAME is missing"
            exit 1
          fi

          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "DOCKERHUB_TOKEN is missing"
            exit 1
          fi

          echo "Docker Hub secrets are configured"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ii-backend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ii-backend:${{ github.sha }} \
            ./backend

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ii-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ii-backend:${{ github.sha }}