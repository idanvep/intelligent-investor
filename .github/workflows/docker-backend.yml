name: Build, Test and Push Backend

on:
  push:
    branches:
      - main
      - dev
      - stage
      - feature/**

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run unit tests
        run: cd backend && npm run test:unit

      - name: Run integration tests
        run: cd backend && npm run test:integration

            - name: Smoke test with Docker Compose
        run: |
          docker compose up -d --build db backend

          echo "Waiting for backend and database..."

          for i in {1..30}; do
            if curl -fsS http://localhost:3001/health; then
              echo "Health check passed"
              exit 0
            fi

            echo "Attempt $i failed - retrying..."
            sleep 2
          done

          echo "Health check failed"
          docker compose logs backend
          docker compose logs db
          exit 1

      - name: Stop smoke test services
        if: always()
        run: docker compose down -v

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ii-backend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/ii-backend:${{ github.sha }} \
            ./backend

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ii-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/ii-backend:${{ github.sha }}