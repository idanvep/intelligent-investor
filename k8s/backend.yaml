apiVersion: apps/v1
kind: Deployment
metadata:
  name: ii-backend
spec:
  replicas: 3

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: ii-backend

  template:
    metadata:
      labels:
        app: ii-backend

    spec:
      containers:
        - name: ii-backend
          image: ii-backend:k8s
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5000

          envFrom:
            - configMapRef:
                name: ii-backend-config

          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ii-db-secret
                  key: DB_PASSWORD

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"

            limits:
              cpu: "250m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: ii-backend-service
spec:
  type: ClusterIP

  selector:
    app: ii-backend

  ports:
    - port: 5000
      targetPort: 5000